<body>

    <script>
        // Multi-language support
        const translations = {
            es: {
                tagline: "Tu galería premium del paraíso<br>Actualizada diariamente con contenido exclusivo",
                daily_photos: "Fotos Diarias",
                hd_videos: "Videos HD",

            en: {

                daily_photos: "Daily Photos",

                languages: "Languages",
                updates: "Updates",
                enter_paradise: "✨ Enter Paradise ✨",
                disclaimer: "🔞 Adults only 18+<br>© 2025 BeachGirl.pics - All rights reserved"
            },
            de: {

                daily_photos: "Tägliche Fotos",
                hd_videos: "HD Videos",

            },
            it: {

                daily_photos: "Foto Giornaliere",
                hd_videos: "Video HD",
                languages: "Lingue",

                enter_paradise: "✨ Entra in Paradiso ✨",
                disclaimer: "🔞 Solo per adulti 18+<br>© 2025 BeachGirl.pics - Tutti i diritti riservati"
            },
            fr: {
                tagline: "Votre galerie premium du paradis<br>Mise à jour quotidiennement avec du contenu exclusif",
                daily_photos: "Photos Quotidiennes",
                hd_videos: "Vidéos HD",
                languages: "Langues",
                updates: "Mises à jour",
                enter_paradise: "✨ Entrer au Paradis ✨",
                disclaimer: "🔞 Adultes uniquement 18+<br>© 2025 BeachGirl.pics - Tous droits réservés"
            },
            pt: {
                tagline: "Sua galeria premium do paraíso<br>Atualizada diariamente com conteúdo exclusivo",
                daily_photos: "Fotos Diárias",
                hd_videos: "Vídeos HD",
                languages: "Idiomas",
                updates: "Atualizações",
                enter_paradise: "✨ Entrar no Paraíso ✨",
                disclaimer: "🔞 Apenas para adultos 18+<br>© 2025 BeachGirl.pics - Todos os direitos reservados"
            }
        };
        
        function changeLanguage(lang) {
            const elements = document.querySelectorAll('[data-translate]');
            elements.forEach(element => {
                const key = element.getAttribute('data-translate');
                if (translations[lang] && translations[lang][key]) {
                    element.innerHTML = translations[lang][key];
                }
            });
            
            // Save language preference
            localStorage.setItem('beach_language', lang);
            document.documentElement.lang = lang;
        }
        
        // Load saved language
        const savedLang = localStorage.getItem('beach_language') || 'es';
        if (savedLang !== 'es') {
            document.querySelector('.language-selector select').value = savedLang;
            changeLanguage(savedLang);
        }
        
        // Track page view
        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_view', {
                page_title: 'Landing Page',
                page_location: window.location.href
            });
        }
    </script>
