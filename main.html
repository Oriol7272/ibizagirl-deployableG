    <!-- ✅ SISTEMA DE TESTING PARA ANUNCIOS REALES -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM loaded - Real Ads System starting...');
            
            // Test después de 5 segundos (dar tiempo a las redes)
            setTimeout(() => {
                if (window.testRealAds) {
                    window.testRealAds();
                    console.log('✅ Real ads system tested');
                } else {
                    console.warn('⚠️ Real ads system not loaded');
                }
            }, 5000);
            
            // Verificar anuncios cada 60 segundos
            setInterval(() => {
                if (window.verifyRealAds) {
                    window.verifyRealAds();
                }
            }, 60000);
            
            // Verificación visual después de 10 segundos
            setTimeout(() => {
                const realContainers = document.querySelectorAll('.real-ad-container');
                const adSlots = document.querySelectorAll('.ad-slot');
                
                console.log(`📊 Real ad containers: ${realContainers.length}`);
                console.log(`📊 Ad slots: ${adSlots.length}`);
                
                if (realContainers.length === 0) {
                    console.warn('⚠️ No real ads detected');
                    if (window.emergencyAds) {
                        console.log('🚨 Creating emergency fallback');
                        window.emergencyAds();
                    }
                } else {
                    console.log('✅ Real ads system working');
                }
            }, 10000);
        });
        
        // Funciones de testing mejoradas
        window.adSystemStatus = function() {
            console.log('📊 === AD SYSTEM STATUS ===');
            
            // Verificar manager
            if (window.realAdsManager) {
                console.log('✅ Real Ads Manager: Loaded');
                console.log('Networks:', window.realAdsManager.networksLoaded);
                console.log('Containers:', window.realAdsManager.adContainers.size);
            } else {
                console.log('❌ Real Ads Manager: Not loaded');
            }
            
            // Verificar contenedores
            const realContainers = document.querySelectorAll('.real-ad-container');
            console.log(`📦 Real containers: ${realContainers.length}`);
            
            // Verificar slots por red
            const networks = ['juicyads', 'exoclick', 'eroads'];
            networks.forEach(network => {
                const slots = document.querySelectorAll(`.${network}-slot`);
                console.log(`🎯 ${network} slots: ${slots.length}`);
            });
            
            // Verificar elementos específicos de anuncios
            const juicyElements = document.querySelectorAll('.adsbyjuicy, ins[data-adzone]');
            console.log(`🍊 JuicyAds elements: ${juicyElements.length}`);
            
            // Verificar scripts cargados
            const adScripts = Array.from(document.scripts).filter(s => 
                s.src.includes('jads.co') || 
                s.src.includes('exoclick') || 
                s.src.includes('eroads') ||
                s.src.includes('magsrv')
            );
            console.log(`📜 Ad scripts loaded: ${adScripts.length}`);
            adScripts.forEach(script => console.log(`  - ${script.src}`));
            
            // Verificar globales
            console.log('🌐 Globals:', {
                adsbyjuicy: typeof window.adsbyjuicy,
                ExoLoader: typeof window.ExoLoader,
                realAdsManager: typeof window.realAdsManager
            });
            
            console.log('📊 === STATUS COMPLETE ===');
        };
        
        // Función para forzar recreación de anuncios
        window.recreateRealAds = function() {
            console.log('🔄 Recreating real ads...');
            if (window.realAdsManager) {
                window.realAdsManager.initialize();
            } else {
                console.warn('❌ Real ads manager not available');
            }
        };
        
        // Función de emergencia
        window.emergencyAds = function() {
            console.log('🚨 Creating emergency ads...');
            
            const emergencyPositions = [
                { 
                    target: '.stats-section', 
                    position: 'afterend',
                    html: '<div style="width:100%;height:90px;background:linear-gradient(135deg,#ff6b35,#f7931e);margin:20px auto;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;border-radius:10px;max-width:800px;box-shadow:0 8px 25px rgba(255,107,53,0.4);">🎯 HEADER AD SPACE - Premium Placement</div>' 
                },
                { 
                    target: '#photosSection', 
                    position: 'afterend',
                    html: '<div style="width:100%;height:250px;background:linear-gradient(135deg,#4CAF50,#45a049);margin:20px auto;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;border-radius:10px;max-width:800px;box-shadow:0 8px 25px rgba(76,175,80,0.4);">🎯 CONTENT AD SPACE - Medium Rectangle</div>' 
                },
                { 
                    target: '#videosSection', 
                    position: 'afterend',
                    html: '<div style="width:100%;height:90px;background:linear-gradient(135deg,#9C27B0,#E91E63);margin:20px auto;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;border-radius:10px;max-width:800px;box-shadow:0 8px 25px rgba(156,39,176,0.4);">🎯 FOOTER AD SPACE - Bottom Banner</div>' 
                }
            ];
            
            emergencyPositions.forEach((pos, index) => {
                const targetElement = document.querySelector(pos.target);
                if (targetElement) {
                    const div = document.createElement('div');
                    div.innerHTML = pos.html;
                    div.style.cssText = 'display:block!important;visibility:visible!important;opacity:1!important;';
                    div.id = `emergency-real-ad-${index + 1}`;
                    div.className = 'emergency-ad-fallback';
                    targetElement.insertAdjacentElement(pos.position, div.firstChild);
                    console.log(`✅ Emergency ad ${index + 1} created`);
                }
            });
            
            console.log('✅ Emergency ads created');
        };
    </script>
